openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Trustleader.org API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: businesses
    description: Business profile operations
  - name: reviews
    description: Review operations
  - name: dashboard
    description: Dashboard operations
  - name: auth
    description: Auth operations
  - name: insurance-companies
    description: Public insurance company profiles and partner listings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ready:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness check (database pool ping)
      responses:
        "200":
          description: Ready to serve DB-backed traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyStatus"
        "503":
          description: Not ready (pool missing or DB unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: Search/list businesses
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search query (name or domain)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessListResponse"

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get business by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insurance-companies/{slug}:
    get:
      operationId: getInsuranceCompany
      tags: [insurance-companies]
      summary: Get insurance company by slug with aggregate stats
      description: |
        Stats are derived from active partner businesses (insurance_proof, active listing) and approved reviews.
        Insurance claim outcomes are not stored; successful-claims counts are not included.
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Insurer profile and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceCompanyDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insurance-companies/{slug}/businesses:
    get:
      operationId: listInsuranceCompanyBusinesses
      tags: [insurance-companies]
      summary: List partner businesses for an insurance company
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated businesses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessListResponse"
        "404":
          description: Insurance company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Post a review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/recent:
    get:
      operationId: listRecentReviews
      tags: [reviews]
      summary: Cached recent approved reviews (refreshed periodically)
      responses:
        "200":
          description: Recent reviews snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentReviewsResponse"

  /reviews/{id}:
    put:
      operationId: updateReview
      tags: [reviews]
      summary: Edit a review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewRequest"
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /businesses/{id}/reviews:
    get:
      operationId: getBusinessReviews
      tags: [reviews]
      summary: Get approved reviews for a business
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"

  /dashboard/company/reviews:
    get:
      operationId: getCompanyReviews
      tags: [dashboard]
      summary: Company dashboard - get reviews for owned business
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Company reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/company/respond:
    post:
      operationId: respondToReview
      tags: [dashboard]
      summary: Company responds to a review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToReviewRequest"
      responses:
        "200":
          description: Response saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/company/business:
    get:
      operationId: getCompanyBusiness
      tags: [dashboard]
      summary: Company dashboard - get own business profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No business registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchCompanyBusiness
      tags: [dashboard]
      summary: Update linked business name and/or description (company owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchCompanyBusinessRequest"
      responses:
        "200":
          description: Updated business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a company account or no linked business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/admin/businesses:
    get:
      operationId: adminListBusinesses
      tags: [dashboard]
      summary: Admin - search/list all businesses
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Business list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/admin/reviews:
    get:
      operationId: adminListReviews
      tags: [dashboard]
      summary: Admin - list reviews for moderation
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ReviewStatus"
        - in: query
          name: business_id
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/admin/reviews/{id}:
    patch:
      operationId: adminSetReviewStatus
      tags: [dashboard]
      summary: Admin - set review moderation status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetReviewStatusRequest"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/company/claim:
    post:
      operationId: claimCompanyBusiness
      tags: [dashboard]
      summary: Link company account to an existing business (owner claim)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimBusinessRequest"
      responses:
        "200":
          description: Updated user profile with business_id set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a company role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Business not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict (already linked elsewhere or business taken)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/consumer/reviews:
    get:
      operationId: getConsumerReviews
      tags: [dashboard]
      summary: Consumer dashboard - get own reviews
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Consumer reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/reseller/stats:
    get:
      operationId: getResellerStats
      tags: [dashboard]
      summary: Reseller dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reseller stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResellerStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/reseller/referrals:
    get:
      operationId: getResellerReferrals
      tags: [dashboard]
      summary: Reseller dashboard referrals
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Referral list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ReadyStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ready]
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    TrafficLight:
      type: string
      enum: [red, orange, green]

    InsuranceCompanySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        logo_url:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        terms_url:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug

    InsuranceCompanyStats:
      type: object
      description: Aggregates from partner businesses and approved reviews (no claim-level data).
      properties:
        partner_businesses:
          type: integer
          description: Businesses with this insurer, insurance_proof true, and active listing
        total_reviews:
          type: integer
          description: Count of approved reviews across those businesses
        average_rating:
          type: number
          format: double
          nullable: true
          description: Mean rating over approved reviews (null if none)
      required:
        - partner_businesses
        - total_reviews

    InsuranceCompanyDetailResponse:
      type: object
      properties:
        insurance:
          $ref: "#/components/schemas/InsuranceCompanySummary"
        stats:
          $ref: "#/components/schemas/InsuranceCompanyStats"
      required:
        - insurance
        - stats

    ListingSource:
      type: string
      enum: [owner_claimed, import_scrape, consumer_first_review]

    ListingStatus:
      type: string
      enum: [pending_verification, active, archived]

    Business:
      type: object
      properties:
        id:
          type: string
        domain:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        traffic_light:
          $ref: "#/components/schemas/TrafficLight"
        insurance_proof:
          type: boolean
          description: Insurer has acknowledged coverage via TrustLeader
        listing_source:
          $ref: "#/components/schemas/ListingSource"
        listing_status:
          $ref: "#/components/schemas/ListingStatus"
        insurance:
          nullable: true
          $ref: "#/components/schemas/InsuranceCompanySummary"
        review_count:
          type: integer
        average_rating:
          type: number
          format: float
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - domain
        - name
        - traffic_light
        - insurance_proof
        - listing_source
        - listing_status
        - review_count
        - created_at
        - updated_at

    BusinessListResponse:
      type: object
      properties:
        businesses:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - businesses
        - total
        - page
        - limit

    ReviewStatus:
      type: string
      enum: [pending, approved, rejected]

    Review:
      type: object
      properties:
        id:
          type: string
        business_id:
          type: string
        user_id:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        status:
          $ref: "#/components/schemas/ReviewStatus"
        company_response:
          type: string
          nullable: true
        business_name:
          type: string
          description: Present on some list endpoints (e.g. admin, consumer)
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - business_id
        - user_id
        - rating
        - text
        - status
        - created_at
        - updated_at

    PatchCompanyBusinessRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      description: At least one field should be set

    AdminSetReviewStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ReviewStatus"
      required:
        - status

    ReviewListResponse:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - reviews
        - total
        - page
        - limit

    RecentReviewPublic:
      type: object
      properties:
        id:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        reviewer_label:
          type: string
        business_id:
          type: string
        business_name:
          type: string
        business_domain:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - rating
        - text
        - reviewer_label
        - business_id
        - business_name
        - business_domain
        - created_at

    RecentReviewsResponse:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/RecentReviewPublic"
        refreshed_at:
          type: string
          format: date-time
          description: When the in-memory cache was last refreshed from the database
      required:
        - reviews

    CreateReviewRequest:
      type: object
      properties:
        business_id:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
          minLength: 10
      required:
        - business_id
        - rating
        - text

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
          minLength: 10
      required:
        - rating
        - text

    RespondToReviewRequest:
      type: object
      properties:
        review_id:
          type: string
        response:
          type: string
          minLength: 1
      required:
        - review_id
        - response

    ClaimBusinessRequest:
      type: object
      properties:
        business_id:
          type: string
          description: Existing business UUID to claim as owner
      required:
        - business_id

    ResellerStats:
      type: object
      properties:
        total_referrals:
          type: integer
        approved_referrals:
          type: integer
        pending_earnings:
          type: number
          format: float
        total_earnings:
          type: number
          format: float
      required:
        - total_referrals
        - approved_referrals
        - pending_earnings
        - total_earnings

    Referral:
      type: object
      properties:
        id:
          type: string
        business_id:
          type: string
        business_name:
          type: string
        business_domain:
          type: string
        status:
          type: string
          enum: [pending, approved, paid]
        commission_amount:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
      required:
        - id
        - business_id
        - business_name
        - business_domain
        - status
        - commission_amount
        - created_at

    ReferralListResponse:
      type: object
      properties:
        referrals:
          type: array
          items:
            $ref: "#/components/schemas/Referral"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - referrals
        - total
        - page
        - limit

    UserRole:
      type: string
      enum: [consumer, company, reseller, admin]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        business_id:
          type: string
          nullable: true
        reseller_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - created_at
