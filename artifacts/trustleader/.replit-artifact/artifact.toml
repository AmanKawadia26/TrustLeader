kind = "web"
previewPath = "/"
title = "Trustleader.org"
version = "1.0.0"
id = "artifacts/trustleader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23292

[services.development]
run = "pnpm --filter @workspace/trustleader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustleader", "run", "build" ]
publicDir = "artifacts/trustleader/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23292"
BASE_PATH = "/"
